*{box-sizing:border-box;margin:0;padding:0;}
:root{--paper:#F5F2EC;--ink:#1F1D1A;--mut:#8A8378;--line:#E7E0D2;--card:#FCFAF5;--seal:#B23A2E;--blue:#2F5A8F;}
body{background:var(--paper);color:var(--ink);font-family:'Pretendard',system-ui,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-variant-numeric:tabular-nums;}
.dy{padding:22px 18px 32px;max-width:680px;margin:0 auto;}
.dy-h{display:flex;align-items:center;gap:13px;margin-bottom:16px;}
.dy-seal{flex:none;width:48px;height:50px;border:2px solid var(--seal);color:var(--seal);border-radius:7px;font-size:13px;line-height:1.2;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;transform:rotate(-4deg);}
.dy-h h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.5px;}
.dy-h p{margin:2px 0 0;font-size:12px;color:var(--mut);}
.dy-search{position:relative;display:flex;align-items:center;margin-bottom:10px;}
.dy-search span{position:absolute;left:13px;font-size:17px;color:var(--mut);}
.dy-search input{width:100%;padding:11px 36px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:15px;outline:none;color:var(--ink);}
.dy-search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,90,143,.12);}
.dy-search button{position:absolute;right:10px;border:none;background:#ECE6DA;color:var(--mut);width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:11px;display:none;}
.dy-chips{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
.dy-chips button{padding:7px 13px;border:1px solid var(--line);background:#fff;color:var(--mut);border-radius:20px;font-size:13px;cursor:pointer;}
.dy-chips button.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}
.rc-dong-wrap{position:relative;}
.rc-dong-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border:1px solid var(--blue);background:#fff;color:var(--blue);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.rc-dong-btn .rc-dong-arrow{font-size:10px;flex-shrink:0;transition:transform .15s;}
.rc-dong-btn.open .rc-dong-arrow{transform:rotate(180deg);}
.rc-dong-panel{position:absolute;top:calc(100% + 6px);left:0;z-index:20;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 6px 20px rgba(60,40,20,.12);padding:6px;min-width:170px;max-height:280px;overflow-y:auto;display:none;}
.rc-dong-panel.open{display:block;}
.rc-dong-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;font-size:13px;cursor:pointer;white-space:nowrap;color:var(--ink);}
.rc-dong-item:hover{background:#F3EEE3;}
.rc-dong-item .box{width:15px;height:15px;border:1.5px solid var(--line);border-radius:4px;flex:none;display:flex;align-items:center;justify-content:center;background:#fff;}
.rc-dong-item.on .box{background:var(--blue);border-color:var(--blue);}
.rc-dong-item.on .box::after{content:"✓";color:#fff;font-size:10px;line-height:1;}
.rc-dong-item.on{font-weight:700;color:var(--blue);}
.rc-dong-all{border-bottom:1px solid var(--line);margin-bottom:4px;padding-bottom:9px;}
.dy-cnt{margin-left:auto;font-size:12.5px;color:var(--mut);}
.dy-notice{background:#fff;border-left:4px solid var(--seal);border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:16px;}
.dy-notice-title{font-size:15px;font-weight:700;color:var(--ink);line-height:1.5;}
.dy-notice-sub{font-size:13px;color:var(--mut);margin-top:3px;line-height:1.5;}
.dy-timeline{position:relative;}
.dy-day{display:grid;grid-template-columns:58px 1fr;gap:14px;position:relative;padding-bottom:18px;}
.dy-day:not(:last-child)::before{content:"";position:absolute;left:28px;top:54px;bottom:0;width:2px;background:var(--line);}
.dy-date{text-align:center;position:relative;z-index:1;}
.dy-num{width:46px;height:46px;margin:0 auto;border-radius:50%;background:var(--ink);color:var(--paper);font-size:19px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.dy-mon{font-size:11px;color:var(--mut);margin-top:4px;font-weight:600;}
.dy-dow{font-size:10px;color:var(--mut);}
.dy-items{display:flex;flex-direction:column;gap:9px;}
.dy-item{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:.14s;}
.dy-item:hover{border-color:#D8CDB8;box-shadow:0 3px 12px rgba(90,70,30,.07);}
.dy-item.high{border-color:var(--seal);}
.dy-item.open{border-color:var(--seal);box-shadow:0 4px 14px rgba(150,60,40,.1);}
.dy-item-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;}
.dy-item-mid{flex:none;display:flex;align-items:center;justify-content:center;margin:0 2px;}
.spark-svg{display:block;}
.spark-none{display:block;}
.dy-apt{font-size:15px;font-weight:700;display:flex;align-items:center;gap:5px;}
.dy-apt-link{cursor:pointer;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color .12s;}
.dy-apt-link:hover{text-decoration-color:var(--blue);color:var(--blue);}
.dy-caret{color:var(--mut);font-size:14px;transition:transform .18s;line-height:1;display:inline-block;}
.dy-caret.up{transform:rotate(180deg);}
.dy-sub{font-size:11.5px;color:var(--mut);margin-top:3px;}
.dy-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.dy-meta span{font-size:10.5px;color:#6f6a5d;background:#EFEADE;border:1px solid var(--line);padding:2px 7px;border-radius:5px;white-space:nowrap;}
.dy-item-l{flex:1;min-width:0;}
.dy-item-r{text-align:right;white-space:nowrap;width:108px;flex:none;}
.dy-price{font-size:16px;font-weight:800;color:var(--seal);}
.dy-tags{display:flex;gap:4px;justify-content:flex-end;margin-top:4px;}
.dy-tags .t{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:700;}
.dy-tags .hi{background:#F7E3E0;color:var(--seal);}
.dy-tags .dr{background:#E7EEF6;color:var(--blue);}
.dy-tags .cx{background:#E8E4DC;color:#857C6C;}
.dy-item.canceled{background:#F4F1E9;border-style:dashed;}
.dy-item.canceled .dy-apt{color:#8A8378;}
.dy-item.canceled .dy-price{color:#9A9286;}
.dy-hist-row.cx .hp{color:#9A9286;}
.dy-hist{background:#F3EEE3;border-top:1px solid var(--line);padding:8px 15px 11px;}
.dy-hist-h{font-size:11px;color:var(--mut);font-weight:600;padding:5px 0 7px;}
.dy-hist-row{display:grid;grid-template-columns:56px 1fr auto;gap:8px;align-items:center;font-size:12.5px;padding:6px 0;border-top:1px dashed #DED5C3;}
.dy-hist-row .hd{color:var(--mut);font-size:11.5px;}
.dy-hist-row .hs{color:var(--mut);font-size:11.5px;}
.dy-hist-row .hp{font-weight:700;text-align:right;white-space:nowrap;}
.dy-hist-none{font-size:12px;color:var(--mut);padding:6px 0 2px;border-top:1px dashed #DED5C3;}
.dy-empty{padding:40px;text-align:center;color:var(--mut);background:var(--card);border:1px dashed var(--line);border-radius:12px;}
.dy-f{margin-top:16px;text-align:center;font-size:11px;color:var(--mut);}
.detail-back{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 14px;border-radius:10px;font-size:13px;cursor:pointer;margin-bottom:14px;}
.detail-back:hover{border-color:#D8CDB8;}
.detail-head{margin-bottom:4px;}
.detail-head h2{font-size:19px;font-weight:800;}
.detail-head .dsub{font-size:12px;color:var(--mut);margin-top:3px;}
.detail-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.detail-meta span{font-size:10.5px;color:#6f6a5d;background:#EFEADE;border:1px solid var(--line);padding:2px 7px;border-radius:5px;}

.area-drop-wrap{position:relative;margin:-4px 0 14px;}

.area-drop-item.on{font-weight:700;color:var(--seal);}
.chart-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;}

.chart-card .chart-sub{font-size:11px;color:var(--mut);margin-bottom:8px;}
.chart-svg{width:100%;height:auto;display:block;}
.hist-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px;}
.hist-table th{text-align:left;padding:7px 8px;background:#F3EEE3;font-weight:600;border-bottom:2px solid var(--line);font-size:12px;color:var(--mut);}
.hist-table td{padding:8px 8px;border-bottom:1px solid #F0EBE0;vertical-align:middle;}

.cmp-btn{margin-left:auto;flex:none;padding:7px 13px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}

.cmp-legend-item.cmp-hidden{opacity:.6;}

.cmp-apt-name{font-size:14px;font-weight:700;cursor:pointer;}

.cmp-apt-sub{font-size:11.5px;color:var(--mut);margin-top:2px;}
.cmp-up-diff-inline{color:#6B8E4E;font-weight:600;}
.cmp-price{text-align:right;}

const DOW = ["일","월","화","수","목","금","토"];
const CUR_YEAR = new Date().getFullYear();

const won = m => {
  const e = Math.floor(m/10000), r = m%10000;
  return e&&r ? `${e}억 ${r.toLocaleString()}만원` : e ? `${e}억원` : `${r.toLocaleString()}만원`;
};

let DATA=[], META={};
let q="", city="전체", selectedDongs=[], dongPanelOpen=false, openId=null;
let view="list", detailApt=null, detailPyeong=null, detailArea=null, areaDropOpen=false;
let cmpSearchQ="", cmpSelectedApt=null, comparePyeong=null, cmpHiddenApts=new Set(), cmpSelectedDongs=new Set();
let CITIES=[], DONGS_BY_CITY={};

function prepare(deals){
  const g={};
  for(const r of deals)(g[r.apt+"|"+r.area]=g[r.apt+"|"+r.area]||[]).push(r);
  for(const k in g){
    const arr=g[k].slice().sort((a,b)=>a.date.localeCompare(b.date));
    let peak=-Infinity;
    for(const r of arr){
      if(r.canceled){r.isHigh=false;continue;}
      r.isHigh=r.amount>peak&&peak!==-Infinity;
      if(r.amount>peak)peak=r.amount;
    }
  }
  return deals;
}

function buildCityList(){
  const cs=new Set();
  for(const r of DATA)cs.add(r.region.split(" ")[0]);
  CITIES=[...cs];
  for(const r of DATA){
    const c=r.region.split(" ")[0];
    (DONGS_BY_CITY[c]=DONGS_BY_CITY[c]||new Set()).add(r.region);
  }
  for(const c in DONGS_BY_CITY)DONGS_BY_CITY[c]=[...DONGS_BY_CITY[c]].sort();
}

function init(){
  if(!SEARCH_DATA||!Array.isArray(SEARCH_DATA.deals)){
    document.getElementById("timeline").innerHTML='<div class="dy-empty">데이터를 아직 불러오지 못했습니다.<br>GitHub Actions 첫 실행 후 갱신됩니다.</div>';
    return;
  }
  DATA=prepare(SEARCH_DATA.deals);
  META=SEARCH_DATA.meta||{};
  document.getElementById("subtitle").textContent=`신고일 기준 일자별 실거래 · ${DATA.length.toLocaleString()}건`;
  document.getElementById("footer").textContent=`갱신: ${SEARCH_DATA.generated_at||""}`;
  buildCityList();
  render();
}

function filteredRows(){
  return DATA.filter(r=>{
    const mc=city==="전체"?true:selectedDongs.length>0?selectedDongs.includes(r.region):r.region.startsWith(city+" ");
    return mc&&(q===""||r.apt.includes(q));
  });
}

function priorDeals(apt,pyeong,date){
  return DATA.filter(x=>x.apt===apt&&x.pyeong===pyeong&&x.date<date)
    .sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
}

function sparkline(points,opts){
  const o=Object.assign({w:130,h:58,color:"#B23A2E"},opts||{});
  const pts=points.filter(p=>!p.canceled).slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(pts.length<2)return `<span class="spark-none" style="width:${o.w}px;height:${o.h}px"></span>`;
  const W=o.w,H=o.h,pL=26,pR=4,pT=7,pB=13;
  const pw=W-pL-pR,ph=H-pT-pB;
  let mn=Infinity,mx=-Infinity;
  for(const p of pts){if(p.amount<mn)mn=p.amount;if(p.amount>mx)mx=p.amount;}
  if(mn===mx){mn*=.97;mx*=1.03;}
  const pa=(mx-mn)*.08;mn-=pa;mx+=pa;
  const t0=+new Date(pts[0].date+"T00:00:00");
  const t1=+new Date(pts[pts.length-1].date+"T00:00:00");
  const xA=t=>t1===t0?pL+pw/2:pL+(t-t0)/(t1-t0)*pw;
  const yA=a=>pT+ph-(a-mn)/(mx-mn)*ph;
  const path=pts.map((p,i)=>{
    const x=xA(+new Date(p.date+"T00:00:00")),y=yA(p.amount);
    return(i===0?"M":"L")+x.toFixed(1)+" "+y.toFixed(1);
  }).join(" ");
  const lx=xA(t1).toFixed(1),ly=yA(pts[pts.length-1].amount).toFixed(1);
  const eok=v=>(v/10000).toFixed(v%10000===0?0:1).replace(/\.0$/,"");
  const fmtM=t=>{const d=new Date(t);return(d.getMonth()+1)+"월";};
  return `<svg class="spark-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <line x1="${pL}" y1="${pT}" x2="${W-pR}" y2="${pT}" stroke="#E7E0D2" stroke-width="1"/>
    <line x1="${pL}" y1="${pT+ph}" x2="${W-pR}" y2="${pT+ph}" stroke="#E7E0D2" stroke-width="1"/>
    <text x="2" y="${pT+3}" font-size="7.5" fill="#9A9286">${eok(mx)}억</text>
    <text x="2" y="${pT+ph+3}" font-size="7.5" fill="#9A9286">${eok(mn)}억</text>
    <text x="${pL}" y="${H-2}" font-size="7.5" fill="#9A9286" text-anchor="start">${fmtM(t0)}</text>
    <text x="${W-pR}" y="${H-2}" font-size="7.5" fill="#9A9286" text-anchor="end">${fmtM(t1)}</text>
    <path d="${path}" fill="none" stroke="${o.color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
    <circle cx="${lx}" cy="${ly}" r="2.6" fill="${o.color}"/>
  </svg>`;
}

function render(){
  if(view==="detail"){renderDetail();return;}
  if(view==="compare"){renderCompare();return;}
  renderList();
}

function renderList(){
  document.getElementById("listView").style.display="";
  document.getElementById("detailView").style.display="none";
  document.getElementById("compareView").style.display="none";
  const rows=filteredRows();
  const g={};
  for(const r of rows){const k=r.reported_date||r.date;(g[k]=g[k]||[]).push(r);}
  const days=Object.entries(g)
    .map(([date,list])=>({date,list:list.slice().sort((a,b)=>b.amount-a.amount)}))
    .sort((a,b)=>b.date.localeCompare(a.date));

  const cityBtns=["전체",...CITIES].map(c=>{
    const on=c===city&&selectedDongs.length===0;
    return `<button class="rc${on?" on":""}" data-city="${c}">${c}</button>`;
  }).join("");

  let dongSel="";
  if(city!=="전체"&&(DONGS_BY_CITY[city]||[]).length>1){
    const dongs=DONGS_BY_CITY[city];
    const sn=r=>r.split(" ").slice(1).join(" ");
    const lbl=selectedDongs.length===0?`${city} 전체`:selectedDongs.length===1?sn(selectedDongs[0]):`${sn(selectedDongs[0])} 외 ${selectedDongs.length-1}곳`;
    const allOn=selectedDongs.length===0;
    const items=`<div class="rc-dong-item rc-dong-all${allOn?" on":""}" data-dong="__all__"><span class="box"></span><span>${city} 전체</span></div>`+
      dongs.map(r=>`<div class="rc-dong-item${selectedDongs.includes(r)?" on":""}" data-dong="${r}"><span class="box"></span><span>${sn(r)}</span></div>`).join("");
    dongSel=`<div class="rc-dong-wrap"><button class="rc-dong-btn${dongPanelOpen?" open":""}" id="dongBtn">${lbl}<span class="rc-dong-arrow">▾</span></button><div class="rc-dong-panel${dongPanelOpen?" open":""}" id="dongPanel">${items}</div></div>`;
  }

  document.getElementById("chips").innerHTML=cityBtns+dongSel+`<span class="dy-cnt">${rows.length.toLocaleString()}건</span>`;

  {
    const sn=r=>r.split(" ").slice(1).join(" ");
    const genDate=SEARCH_DATA.generated_at?SEARCH_DATA.generated_at.split(" ")[0]:"";
    const [gy,gm,gd]=genDate?genDate.split("-"):["","",""];
    const genFmt=genDate?`${gy}년 ${+gm}월 ${+gd}일`:"";
    const regionRows=DATA.filter(r=>city==="전체"?true:selectedDongs.length>0?selectedDongs.includes(r.region):r.region.startsWith(city+" "));
    const newRows=regionRows.filter(r=>r.reported_date===genDate);
    const highCount=newRows.filter(r=>r.isHigh&&!r.canceled).length;
    let noticeHtml="";
    if(city!=="전체"){
      const locLabel=selectedDongs.length===0?city:selectedDongs.length===1?`${city} ${sn(selectedDongs[0])}`:`${city} ${sn(selectedDongs[0])} 외 ${selectedDongs.length-1}곳`;
      noticeHtml=`<div class="dy-notice"><div class="dy-notice-title">${locLabel} 일별 실거래 현황입니다.</div><div class="dy-notice-sub">${genFmt} 기준 총 ${newRows.length.toLocaleString()}건 신규 신고${highCount>0?` · 신고가 ${highCount}건`:""}</div></div>`;
    }
    document.getElementById("notice").innerHTML=noticeHtml;
  }

  let html="";
  if(days.length===0){
    html='<div class="dy-empty">조건에 맞는 거래가 없습니다.</div>';
  }else{
    html='<div class="dy-timeline">';
    for(const d of days){
      const dt=new Date(d.date+"T00:00:00");
      const [,mo,day]=d.date.split("-");
      html+=`<section class="dy-day"><div class="dy-date"><div class="dy-num">${+day}</div><div class="dy-mon">${+mo}월</div><div class="dy-dow">${DOW[dt.getDay()]}</div></div><div class="dy-items">`;
      for(let i=0;i<d.list.length;i++){
        const r=d.list[i];
        const id=`${d.date}|${r.apt}|${r.pyeong}|${i}`;
        const isOpen=openId===id;
        const m=META[r.apt]||{};
        const hist4spark=DATA.filter(x=>x.apt===r.apt&&x.pyeong===r.pyeong&&x.date<=r.date&&!x.canceled).sort((a,b)=>a.date.localeCompare(b.date));
        html+=`<div class="dy-item${isOpen?" open":""}${r.canceled?" canceled":""}${r.isHigh&&!r.canceled?" high":""}" data-id="${id}">`;
        html+=`<div class="dy-item-head"><div class="dy-item-l"><div class="dy-apt"><span class="dy-apt-link" data-apt="${r.apt.replace(/"/g,"&quot;")}">${r.apt}</span>${r.isHigh&&!r.canceled?'<span style="font-size:13px">🔥</span>':""}<span class="dy-caret${isOpen?" up":""}">▾</span></div><div class="dy-sub">${r.region} · 전용 ${r.area}㎡ · ${r.pyeong}평 · ${r.floor}층</div><div class="dy-sub">계약 ${r.date.slice(2)}</div>${m.buildYear?`<div class="dy-meta"><span>준공 ${m.buildYear}년 (${CUR_YEAR-m.buildYear}년차)</span>${m.vlRat&&+m.vlRat<600?`<span>용적률 ${Math.round(+m.vlRat)}%</span>`:""}</div>`:""}</div><div class="dy-item-mid">${sparkline(hist4spark,{color:r.canceled?"#9A9286":"#B23A2E"})}</div><div class="dy-item-r"><div class="dy-price">${won(r.amount)}</div><div class="dy-tags">${r.canceled?'<span class="t cx">취소</span>':""}${r.isHigh&&!r.canceled?'<span class="t hi">신고가</span>':""}${r.direct&&!r.canceled?'<span class="t dr">직거래</span>':""}</div></div></div>`;
        if(isOpen){
          const hist=priorDeals(r.apt,r.pyeong,r.date);
          html+=`<div class="dy-hist"><div class="dy-hist-h">${r.pyeong}평 이전 거래</div>`;
          if(hist.length===0)html+='<div class="dy-hist-none">이전 거래 기록 없음</div>';
          else for(const h of hist)html+=`<div class="dy-hist-row${h.canceled?" cx":""}"><span class="hd">${h.date.slice(2)}</span><span class="hs">${h.floor}층${h.direct?" · 직거래":""}${h.canceled?" · 취소":""}</span><span class="hp">${won(h.amount)}${h.isHigh?" 🔥":""}</span></div>`;
          html+="</div>";
        }
        html+="</div>";
      }
      html+="</div></section>";
    }
    html+="</div>";
  }
  document.getElementById("timeline").innerHTML=html;

  document.querySelectorAll(".rc").forEach(b=>b.addEventListener("click",()=>{city=b.dataset.city;selectedDongs=[];dongPanelOpen=false;render();}));
  const db=document.getElementById("dongBtn");
  if(db)db.addEventListener("click",e=>{e.stopPropagation();dongPanelOpen=!dongPanelOpen;render();});
  document.querySelectorAll(".rc-dong-item").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const d=el.dataset.dong;
    if(d==="__all__")selectedDongs=[];
    else if(selectedDongs.includes(d))selectedDongs=selectedDongs.filter(x=>x!==d);
    else selectedDongs=[...selectedDongs,d];
    render();
  }));
  document.querySelectorAll(".dy-apt-link").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();openDetail(el.dataset.apt);}));
  document.querySelectorAll(".dy-item-head").forEach(h=>h.addEventListener("click",e=>{
    if(e.target.closest(".dy-apt-link"))return;
    const id=h.closest(".dy-item").dataset.id;
    openId=(openId===id?null:id);render();
  }));
}

const CMP_COLORS=["#2F5A8F","#6B8E4E","#3D7A8A","#7A5295","#C47D2F","#5C7A3E","#8B4B6E","#4A7A8A"];

function renderCmpMultiChart(series){
  const W=640,H=220,pL=64,pR=14,pT=12,pB=28;
  const allPts=series.flatMap(s=>s.pts);
  if(!allPts.length)return'';
  let mn=Infinity,mx=-Infinity;
  for(const p of allPts){if(p.amount<mn)mn=p.amount;if(p.amount>mx)mx=p.amount;}
  if(mn===mx){mn*=.95;mx*=1.05;}
  const pa=(mx-mn)*.1;mn-=pa;mx+=pa;
  let t0=Infinity,t1=-Infinity;
  for(const p of allPts){const t=+new Date(p.date+"T00:00:00");if(t<t0)t0=t;if(t>t1)t1=t;}
  if(t0===t1){t0-=30*86400000;t1+=30*86400000;}
  const xS=t=>pL+(t-t0)/(t1-t0)*(W-pL-pR);
  const yS=a=>H-pB-(a-mn)/(mx-mn)*(H-pT-pB);
  let out='';
  for(let i=0;i<=4;i++){
    const a=mn+(mx-mn)*i/4,y=yS(a);
    out+=`<line x1="${pL}" y1="${y.toFixed(1)}" x2="${W-pR}" y2="${y.toFixed(1)}" stroke="#E7E0D2" stroke-width="1"/>`;
    out+=`<text x="${pL-6}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#8A8378">${((Math.round(a)/10000).toFixed(1).replace(/\.0$/,""))+"억"}</text>`;
  }
  const months=new Set();
  for(const p of allPts)months.add(p.date.slice(0,7));
  for(const m of [...months].sort()){
    const t=+new Date(m+"-15T00:00:00");
    if(t>=t0&&t<=t1)out+=`<text x="${xS(t).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="9" fill="#8A8378">${m.slice(2,7)}</text>`;
  }
  const sorted=[...series].sort((a,b)=>a.isSelected?1:-1);
  for(const s of sorted){
    if(!s.pts.length)continue;
    const pts=s.pts.slice().sort((a,b)=>a.date.localeCompare(b.date));
    const path=pts.map((p,i)=>{const x=xS(+new Date(p.date+"T00:00:00")),y=yS(p.amount);return(i===0?"M":"L")+x.toFixed(1)+" "+y.toFixed(1);}).join(" ");
    const sw=s.isSelected?2.8:1.6,op=s.isSelected?1:.5;
    out+=`<path d="${path}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" opacity="${op}"/>`;
    const last=pts[pts.length-1];
    out+=`<circle cx="${xS(+new Date(last.date+"T00:00:00")).toFixed(1)}" cy="${yS(last.amount).toFixed(1)}" r="${s.isSelected?4:2.5}" fill="${s.color}" opacity="${op}"/>`;
  }
  return`<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">${out}</svg>`;
}

function openCompare(){

  cmpSearchQ="";
  cmpSelectedApt=null;
  comparePyeong=null;
  render();
}

function _cmpUpdateResults(){
  const aptNames=[...new Set(DATA.map(r=>r.apt))].sort();
  const results=cmpSearchQ.length>=1?aptNames.filter(n=>n.includes(cmpSearchQ)).slice(0,8):[];
  let html='';
  if(results.length){
    html='<div class="cmp-results">';
    for(const n of results){
      const r0=DATA.find(r=>r.apt===n);
      html+=`<div class="cmp-result-item" data-apt="${n.replace(/"/g,'&quot;')}"><div class="cmp-result-name">${n}</div><div class="cmp-result-sub">${r0?r0.region:""}</div></div>`;
    }
    html+='</div>';
  }else if(cmpSearchQ.length>=1){
    html='<div class="dy-empty" style="margin-top:8px">검색 결과 없음</div>';
  }
  const list=document.getElementById("cmpResultsList");
  if(list)list.innerHTML=html;
  document.querySelectorAll(".cmp-result-item").forEach(el=>el.addEventListener("click",()=>{cmpSelectedApt=el.dataset.apt;comparePyeong=null;cmpHiddenApts=new Set();cmpSelectedDongs=new Set();renderCompare();}));
}

function renderCompare(){
  document.getElementById("listView").style.display="none";
  document.getElementById("detailView").style.display="none";
  document.getElementById("compareView").style.display="";

  if(!cmpSelectedApt){
    document.getElementById("cmpBack").textContent="← 목록으로";
    document.getElementById("cmpBack").onclick=()=>{view="list";render();};
    document.getElementById("cmpSub").textContent="단지를 검색해 비교를 시작하세요";
    document.getElementById("cmpDongChips").innerHTML="";
    document.getElementById("cmpPyeongBtns").innerHTML="";
    document.getElementById("cmpBody").innerHTML=`<div class="cmp-search-wrap"><span class="cmp-search-icon">⌕</span><input class="cmp-search-input" id="cmpSearchEl" placeholder="단지명 검색..."/></div><div id="cmpResultsList"></div>`;
    const el=document.getElementById("cmpSearchEl");
    let composing=false;
    el.addEventListener("compositionstart",()=>{composing=true;});
    el.addEventListener("compositionend",()=>{composing=false;cmpSearchQ=el.value.trim();_cmpUpdateResults();});
    el.addEventListener("input",()=>{if(!composing){cmpSearchQ=el.value.trim();_cmpUpdateResults();}});
    el.focus();
    _cmpUpdateResults();
    return;
  }

  // Phase B: apt selected
  const aptRegion=(DATA.find(r=>r.apt===cmpSelectedApt)||{}).region||"";
  const aptCity=aptRegion.split(" ")[0];
  const aptDeals=DATA.filter(r=>r.apt===cmpSelectedApt&&!r.canceled);
  const pyeongCounts={};
  for(const r of aptDeals)(pyeongCounts[r.pyeong]=(pyeongCounts[r.pyeong]||0)+1);
  const pyeongs=Object.keys(pyeongCounts).map(Number).sort((a,b)=>a-b);
  if(comparePyeong===null||!pyeongs.includes(comparePyeong))comparePyeong=pyeongs.reduce((a,b)=>pyeongCounts[a]>=pyeongCounts[b]?a:b,pyeongs[0])||null;
  const avgByPyeong={};
  for(const p of pyeongs){
    const rows=aptDeals.filter(r=>r.pyeong===p);
    if(rows.length)avgByPyeong[p]=Math.round(rows.reduce((s,r)=>s+r.amount,0)/rows.length);
  }

  document.getElementById("cmpBack").textContent="← 다시 검색";
  document.getElementById("cmpBack").onclick=()=>{cmpSelectedApt=null;cmpSearchQ="";renderCompare();};
  document.getElementById("cmpSub").textContent=`${cmpSelectedApt} · ${aptRegion}`;
  const allCityDongs=[...new Set(DATA.filter(r=>r.region.startsWith(aptCity+" ")).map(r=>r.region))].sort();
  document.getElementById("cmpDongChips").innerHTML=allCityDongs.length>1?`<div class="cmp-dong-chips">${allCityDongs.map(d=>{const label=d.split(" ")[1];const on=cmpSelectedDongs.has(d);return`<button class="cmp-dong-chip${on?" on":""}" data-dong="${d}">${label}</button>`;}).join("")}</div>`:"";

  document.getElementById("cmpPyeongBtns").innerHTML=`<div class="cmp-pyeong-cards">${pyeongs.map(p=>{
    const on=p===comparePyeong;
    const nextP=pyeongs.find(x=>x>p);
    let diffStr="";
    if(nextP&&avgByPyeong[nextP]&&avgByPyeong[p]){
      const d=avgByPyeong[nextP]-avgByPyeong[p];
      diffStr=`[${nextP}평]<br>${d>=0?"+":"−"}${won(Math.abs(d))}`;
    }
    const avg=avgByPyeong[p],ae=Math.floor(avg/10000),ar=avg%10000;
    const avgHtml=ae&&ar?`${ae}억<wbr>${ar.toLocaleString()}만원`:won(avg);
    return`<div class="cmp-pyeong-card${on?" on":""}" data-p="${p}"><div class="cp-size">${p}평</div><div class="cp-count">${pyeongCounts[p]}건</div><div class="cp-avg">${avgHtml}</div>${diffStr?`<div class="cp-diff">${diffStr}</div>`:""}</div>`;
  }).join("")}</div>`;

  let bodyHtml="";
  if(comparePyeong!==null){
    const cityDeals=DATA.filter(r=>r.region.startsWith(aptCity+" ")&&!r.canceled);
    const filteredByDong=cmpSelectedDongs.size>0?cityDeals.filter(r=>cmpSelectedDongs.has(r.region)):cityDeals;
    const dongDeals=filteredByDong.filter(r=>Math.abs(r.pyeong-comparePyeong)<=1);
    const apts=[...new Set(dongDeals.map(r=>r.apt))];
    const stats=apts.map(apt=>{
      const rows=dongDeals.filter(r=>r.apt===apt).sort((a,b)=>b.date.localeCompare(a.date));
      const aptAll=DATA.filter(r=>r.apt===apt&&!r.canceled);
      const aptPyeongs=[...new Set(aptAll.map(r=>r.pyeong))].map(Number).sort((a,b)=>a-b);
      const maxRowPyeong=Math.max(...rows.map(r=>r.pyeong));
      const nextP=aptPyeongs.find(x=>x>maxRowPyeong);
      let upDiff=null;
      if(nextP){
        const curAvg=Math.round(rows.reduce((s,r)=>s+r.amount,0)/rows.length);
        const nextRows=aptAll.filter(r=>r.pyeong===nextP);
        const nextAvg=Math.round(nextRows.reduce((s,r)=>s+r.amount,0)/nextRows.length);
        upDiff={pyeong:nextP,diff:nextAvg-curAvg};
      }
      return{apt,latest:rows[0],count:rows.length,rows,upDiff};
    }).sort((a,b)=>b.latest.amount-a.latest.amount);

    const series=stats.map((s,i)=>({
      apt:s.apt,
      pts:s.rows.slice().sort((a,b)=>a.date.localeCompare(b.date)),
      color:s.apt===cmpSelectedApt?"#B23A2E":CMP_COLORS[i%CMP_COLORS.length],
      isSelected:s.apt===cmpSelectedApt
    }));

    const visibleSeries=series.filter(s=>!cmpHiddenApts.has(s.apt));
    const regionLabel=cmpSelectedDongs.size>0?[...cmpSelectedDongs].map(d=>d.split(" ")[1]).join("·"):aptCity+" 전체";
    bodyHtml+=`<div class="cmp-chart-wrap"><h3>${regionLabel} · ${comparePyeong}평 (±1평) 거래 추이</h3>${renderCmpMultiChart(visibleSeries.length?visibleSeries:series)}<div class="cmp-legend">${series.map(s=>{const hidden=cmpHiddenApts.has(s.apt);return`<div class="cmp-legend-item${hidden?" cmp-hidden":""}" data-legend-apt="${s.apt.replace(/"/g,"&quot;")}"><div class="cmp-legend-dot" style="background:${s.color};opacity:${hidden?.35:s.isSelected?1:.6}"></div><span style="${hidden?"color:#B0A898;text-decoration:line-through":s.isSelected?"font-weight:700":"color:var(--mut)"}">${s.apt}</span></div>`;}).join("")}</div></div>`;

    bodyHtml+='<div class="cmp-list">';
    for(let i=0;i<stats.length;i++){
      const s=stats[i];
      const isHL=s.apt===cmpSelectedApt;
      const color=isHL?"#B23A2E":CMP_COLORS[i%CMP_COLORS.length];
      const diffHtml=s.upDiff?` · <span class="cmp-up-diff-inline">[${s.upDiff.pyeong}평] ${s.upDiff.diff>=0?"+":"−"}${won(Math.abs(s.upDiff.diff))}</span>`:"";
      bodyHtml+=`<div class="cmp-row${isHL?" highlight":""}"><div class="cmp-rank" style="color:${color}">${i+1}</div><div class="cmp-info"><div class="cmp-apt-name" data-apt="${s.apt.replace(/"/g,"&quot;")}">${s.apt}</div><div class="cmp-apt-sub">${s.count}건${diffHtml}</div></div><div class="cmp-spark">${sparkline(s.rows,{w:130,h:58,color})}</div><div class="cmp-price"><div class="cmp-amt" style="color:${color}">${won(s.latest.amount)}</div><div class="cmp-date">${s.latest.date.slice(2,7)}</div></div></div>`;
    }
    bodyHtml+='</div>';
  }else{
    bodyHtml='<div class="dy-empty">데이터가 없습니다.</div>';
  }
  document.getElementById("cmpBody").innerHTML=bodyHtml;
  document.querySelectorAll("#cmpDongChips .cmp-dong-chip").forEach(b=>b.addEventListener("click",()=>{const d=b.dataset.dong;if(cmpSelectedDongs.has(d))cmpSelectedDongs.delete(d);else cmpSelectedDongs.add(d);cmpHiddenApts=new Set();renderCompare();}));
  document.querySelectorAll("#cmpPyeongBtns .cmp-pyeong-card").forEach(b=>b.addEventListener("click",()=>{comparePyeong=+b.dataset.p;cmpHiddenApts=new Set();renderCompare();}));
  document.querySelectorAll("#cmpBody .cmp-apt-name").forEach(el=>el.addEventListener("click",()=>openDetail(el.dataset.apt)));
  document.querySelectorAll(".cmp-legend-item").forEach(el=>el.addEventListener("click",()=>{const a=el.dataset.legendApt;if(cmpHiddenApts.has(a))cmpHiddenApts.delete(a);else cmpHiddenApts.add(a);renderCompare();}));
}

function openDetail(apt){detailApt=apt;detailPyeong=null;detailArea=null;areaDropOpen=false;view="detail";render();}

function renderDetail(){
  document.getElementById("listView").style.display="none";
  document.getElementById("detailView").style.display="";
  document.getElementById("compareView").style.display="none";
  const aptRows=DATA.filter(r=>r.apt===detailApt);
  const m=META[detailApt]||{};
  document.getElementById("detailTitle").textContent=detailApt;
  document.getElementById("detailSub").textContent=aptRows[0]?.region||"";
  const tags=[];
  if(m.buildYear)tags.push(`준공 ${m.buildYear}년 (${CUR_YEAR-m.buildYear}년차)`);
  if(m.vlRat&&+m.vlRat>0&&+m.vlRat<600)tags.push(`용적률 ${Math.round(+m.vlRat)}%`);
  if(m.bcRat&&+m.bcRat>0&&+m.bcRat<100)tags.push(`건폐율 ${Math.round(+m.bcRat)}%`);
  document.getElementById("detailMeta").innerHTML=tags.map(t=>`<span>${t}</span>`).join("");
  const pc={};
  for(const r of aptRows)if(!r.canceled)pc[r.pyeong]=(pc[r.pyeong]||0)+1;
  const pl=Object.keys(pc).map(Number).sort((a,b)=>a-b);
  if(detailPyeong===null||!pl.includes(detailPyeong))detailPyeong=pl.slice().sort((a,b)=>pc[b]-pc[a])[0];
  document.getElementById("pyeongBtns").innerHTML=pl.map(p=>`<button class="pb${p===detailPyeong?" on":""}" data-p="${p}">${p}평 (${pc[p]||0}건)</button>`).join("");
  document.querySelectorAll(".pb").forEach(b=>b.addEventListener("click",()=>{detailPyeong=+b.dataset.p;detailArea=null;areaDropOpen=false;renderDetail();}));
  document.getElementById("detailBack").onclick=()=>{view="list";render();};
  document.getElementById("detailCmpBtn").onclick=()=>{cmpSelectedApt=detailApt;comparePyeong=null;cmpHiddenApts=new Set();cmpSelectedDongs=new Set();view="compare";render();};

  // 전용면적 서브 드롭다운
  const areas=[...new Set(aptRows.filter(r=>r.pyeong===detailPyeong&&!r.canceled).map(r=>r.area))].sort((a,b)=>a-b);
  if(detailArea!==null&&!areas.includes(detailArea))detailArea=null;
  if(areas.length>1){
    const lbl=detailArea===null?`${detailPyeong}평 전체`:`전용 ${detailArea}㎡`;
    const items=`<div class="area-drop-item${detailArea===null?" on":""}" data-area="__all__">전체</div>`+
      areas.map(a=>`<div class="area-drop-item${detailArea===a?" on":""}" data-area="${a}">전용 ${a}㎡</div>`).join("");
    document.getElementById("areaDrop").innerHTML=`<div class="area-drop-wrap"><button class="area-drop-btn" id="areaDropBtn">${lbl} ▾</button><div class="area-drop-panel${areaDropOpen?" open":""}" id="areaDropPanel">${items}</div></div>`;
    document.getElementById("areaDropBtn").addEventListener("click",e=>{e.stopPropagation();areaDropOpen=!areaDropOpen;renderDetail();});
    document.querySelectorAll(".area-drop-item").forEach(el=>el.addEventListener("click",e=>{
      e.stopPropagation();const a=el.dataset.area;
      detailArea=a==="__all__"?null:parseFloat(a);areaDropOpen=false;renderDetail();
    }));
  }else{
    document.getElementById("areaDrop").innerHTML="";
  }

  const areaFilter=r=>detailArea===null||r.area===detailArea;
  const pts=aptRows.filter(r=>r.pyeong===detailPyeong&&!r.canceled&&areaFilter(r)).sort((a,b)=>a.date.localeCompare(b.date));
  const areaLabel=detailArea!==null?`전용 ${detailArea}㎡`:areas.length===1?`전용 ${areas[0]}㎡`:`${areas.length}개 면적 전체`;
  document.getElementById("chartTitle").textContent=`${detailPyeong}평 (${areaLabel}) 거래 추이`;
  document.getElementById("chartSub").textContent=`${pts.length}건`;
  renderChart(pts);
  renderHistTable(aptRows.filter(r=>r.pyeong===detailPyeong&&areaFilter(r)).sort((a,b)=>b.date.localeCompare(a.date)));
}

function renderChart(pts){
  const svg=document.getElementById("chartSvg");
  if(!pts.length){svg.innerHTML='<text x="320" y="130" text-anchor="middle" fill="#8A8378" font-size="14">데이터 없음</text>';return;}
  const W=640,H=260,pL=62,pR=14,pT=14,pB=30;
  let mn=Infinity,mx=-Infinity;
  for(const p of pts){if(p.amount<mn)mn=p.amount;if(p.amount>mx)mx=p.amount;}
  if(mn===mx){mn*=.95;mx*=1.05;}
  const pa=(mx-mn)*.08;mn-=pa;mx+=pa;
  const t0=+new Date(pts[0].date+"T00:00:00");
  const t1=+new Date(pts[pts.length-1].date+"T00:00:00");
  const xS=t=>t1===t0?pL+(W-pL-pR)/2:pL+(t-t0)/(t1-t0)*(W-pL-pR);
  const yS=a=>H-pB-(a-mn)/(mx-mn)*(H-pT-pB);
  let out="";
  for(let i=0;i<=4;i++){
    const a=mn+(mx-mn)*i/4,y=yS(a);
    out+=`<line x1="${pL}" y1="${y.toFixed(1)}" x2="${W-pR}" y2="${y.toFixed(1)}" stroke="#E7E0D2" stroke-width="1"/>`;
    out+=`<text x="${pL-6}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#8A8378">${((Math.round(a)/10000).toFixed(1).replace(/\.0$/,""))+"억"}</text>`;
  }
  const tc=Math.min(5,pts.length);
  const st=Math.floor((pts.length-1)/(tc-1||1));
  const ti=new Set();for(let i=0;i<tc;i++)ti.add(Math.min(i*st,pts.length-1));
  for(const idx of ti){const p=pts[idx];const x=xS(+new Date(p.date+"T00:00:00"));out+=`<text x="${x.toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="9" fill="#8A8378">${p.date.slice(2,7)}</text>`;}
  const lp=pts.map((p,i)=>{const x=xS(+new Date(p.date+"T00:00:00")),y=yS(p.amount);return(i===0?"M":"L")+x.toFixed(1)+" "+y.toFixed(1);}).join(" ");
  out+=`<path d="${lp}" fill="none" stroke="#B23A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  for(const p of pts){const x=xS(+new Date(p.date+"T00:00:00")),y=yS(p.amount);if(p.isHigh)out+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5" fill="#B23A2E" stroke="#fff" stroke-width="1.5"/>`;else out+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="#B23A2E" stroke="#fff" stroke-width="1"/>`;}
  svg.innerHTML=out;
}

function renderHistTable(rows){
  document.getElementById("histBody").innerHTML=rows.map(r=>{
    const tags=[];
    if(r.canceled)tags.push('<span class="tag cx">취소</span>');
    if(r.isHigh)tags.push('<span class="tag hi">신고가</span>');
    if(r.direct&&!r.canceled)tags.push('<span class="tag dr">직거래</span>');
    return `<tr class="${r.canceled?"cx":""}"><td>${r.date.slice(2)}</td><td>${r.floor}층</td><td>${r.area}㎡</td><td class="hp">${r.canceled?`<s>${won(r.amount)}</s>`:won(r.amount)}</td><td>${tags.join(" ")}</td></tr>`;
  }).join("");
}

const searchEl=document.getElementById("searchInput");
const clearBtn=document.getElementById("clearBtn");
searchEl.addEventListener("input",()=>{q=searchEl.value.trim();clearBtn.style.display=q?"":"none";openId=null;render();});
clearBtn.addEventListener("click",()=>{q="";searchEl.value="";clearBtn.style.display="none";render();});
document.addEventListener("click",()=>{
  let changed=false;
  if(dongPanelOpen){dongPanelOpen=false;changed=true;}
  if(areaDropOpen){areaDropOpen=false;changed=true;}
  if(changed)render();
});
document.getElementById("cmpBtn").addEventListener("click",openCompare);

init();
</script>
