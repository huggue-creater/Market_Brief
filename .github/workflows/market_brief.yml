name: Market Brief

on:
  # 06:20 KST Mon-Fri = 21:20 UTC Sun-Thu (GitHub Actions는 UTC 기준)
  # 07:20 / 08:20 KST 백업: GitHub 스케줄 지연/미발화 대비, check_dup_run이 중복 방지
  schedule:
    - cron: "20 21 * * 0-4"
    - cron: "20 22 * * 0-4"
    - cron: "20 23 * * 0-4"

  # 수동 트리거 (테스트용)
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (collect + send Telegram + generate search JSON)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DATA_GO_KR_KEY:     ${{ secrets.DATA_GO_KR_KEY }}
          # workflow_dispatch이면 dup 체크 건너뜀 — 수동 실행은 항상 동작
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python bot.py

      - name: Inject search data into index.html
        run: python inject_data.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: market-brief-${{ github.run_id }}
          path: |
            index.html
            search_data.json
          retention-days: 7

      - name: Commit & push updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage only known state files (never accidentally stage secrets etc.)
          git add apt_state.json building_cache.json search_data.json index.html last_run.txt reported_dates.json 2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "chore: market brief $(date -u +'%Y-%m-%d')" && \
            git push
