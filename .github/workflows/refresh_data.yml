name: Refresh Search Data

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate search JSON (공급면적 기준 평형 반영)
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: python bot.py --json-only

      - name: Inject search data into index.html
        run: python inject_data.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add building_cache.json search_data.json index.html 2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "chore: refresh search data (공급면적 평형)" && \
            git push
